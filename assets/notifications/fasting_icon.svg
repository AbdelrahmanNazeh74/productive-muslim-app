<?xml version="1.0" encoding="UTF-8"?>
<!-- Fasting / Iftar notification icon: crescent moon + small sun. White on transparent. 96×96. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Crescent moon -->
  <defs>
    <mask id="fasting-crescent">
      <circle cx="42" cy="56" r="34" fill="white"/>
      <circle cx="54" cy="49" r="27" fill="black"/>
    </mask>
  </defs>
  <circle cx="42" cy="56" r="34" fill="white" mask="url(#fasting-crescent)"/>
  <!-- Small sun (upper right) -->
  <circle cx="76" cy="20" r="7" fill="white"/>
  <!-- Sun rays -->
  <line x1="76"  y1="6"  x2="76"  y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76"  y1="30" x2="76"  y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62"  y1="20" x2="66"  y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="86"  y1="20" x2="90"  y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66"  y1="10" x2="69"  y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83"  y1="27" x2="86"  y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83"  y1="13" x2="86"  y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66"  y1="27" x2="69"  y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
