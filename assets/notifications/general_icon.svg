<?xml version="1.0" encoding="UTF-8"?>
<!-- General notification icon: clock face with small crescent overlay. White on transparent. 96×96. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Clock body -->
  <circle cx="48" cy="54" r="34" fill="none" stroke="white" stroke-width="5"/>
  <!-- 12 o'clock tick -->
  <line x1="48" y1="23" x2="48" y2="29" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 3/6/9 ticks -->
  <line x1="79" y1="54" x2="73" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="85" x2="48" y2="79" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="17" y1="54" x2="23" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~11) -->
  <line x1="48" y1="54" x2="38" y2="36" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2) -->
  <line x1="48" y1="54" x2="62" y2="44" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="48" cy="54" r="3.5" fill="white"/>
  <!-- Small crescent (top-right badge) -->
  <defs>
    <mask id="gen-crescent">
      <circle cx="76" cy="18" r="13" fill="white"/>
      <circle cx="83" cy="15" r="10" fill="black"/>
    </mask>
  </defs>
  <circle cx="76" cy="18" r="13" fill="white" mask="url(#gen-crescent)"/>
</svg>
