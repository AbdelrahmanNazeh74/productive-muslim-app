<?xml version="1.0" encoding="UTF-8"?>
<!-- Prayer notification icon: person in sujood (prostration) silhouette. White on transparent. 96×96. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Head on ground -->
  <circle cx="14" cy="64" r="8" fill="white"/>
  <!-- Back / torso arc -->
  <path d="M22 64 Q46 52 68 40" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Raised hips + legs -->
  <path d="M68 40 L72 62 L82 78" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Prayer mat base line -->
  <path d="M6 78 Q48 71 90 78" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Mat arch decoration -->
  <path d="M24 78 Q48 60 72 78" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
